<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYRA AI 2.0 : SYSTEM HUNTER</title>
    <!-- Sci-Fi Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            background-color: #010409;
            color: #00f0ff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
        }

        /* 🌌 JINWOO AURA BACKGROUND - 3D Effect */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* यहाँ अपनी जिन्हू वाली HD फोटो का लिंक या नाम डालें। cover से फोटो फटेगी नहीं! */
            background: url('https://images.unsplash.com/photo-1618519764620-7403abdbdfe9?q=80&w=2000') center/cover no-repeat;
            z-index: -2;
            filter: brightness(0.4) contrast(1.2);
        }

        /* Aura & Eye Glow Overlay */
        .aura-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 40%, rgba(0, 100, 255, 0.15) 0%, rgba(0, 0, 0, 0.8) 80%);
            box-shadow: inset 0 0 150px rgba(0, 150, 255, 0.3);
            z-index: -1;
            animation: pulseAura 4s infinite alternate;
        }

        @keyframes pulseAura {
            0% { box-shadow: inset 0 0 100px rgba(0, 150, 255, 0.2); }
            100% { box-shadow: inset 0 0 200px rgba(0, 200, 255, 0.5); }
        }

        /* ================= HOME SCREEN ================= */
        #homeScreen {
            position: absolute;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        #hudCanvas {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 11;
        }

        .hero-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 20px #00f0ff, 0 0 40px #0055ff;
            z-index: 12;
            letter-spacing: 5px;
            text-align: center;
            margin-bottom: 10px;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: #ff8c00;
            letter-spacing: 3px;
            z-index: 12;
            margin-bottom: 250px; /* Space for canvas */
            text-shadow: 0 0 10px rgba(255, 140, 0, 0.8);
        }

        .enter-btn {
            z-index: 12;
            background: rgba(0, 240, 255, 0.1);
            border: 2px solid #00f0ff;
            color: #00f0ff;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            transition: all 0.3s ease;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        .enter-btn:hover {
            background: #00f0ff;
            color: #000;
            box-shadow: 0 0 30px #00f0ff;
            transform: scale(1.05);
        }

        /* ================= CHAT SCREEN ================= */
        #chatScreen {
            position: absolute;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            z-index: 20;
            background: rgba(1, 4, 9, 0.85); /* Dark transparent bg for chat */
            backdrop-filter: blur(5px);
        }

        .chat-header {
            padding: 15px 20px;
            background: linear-gradient(90deg, rgba(0,20,40,0.9) 0%, rgba(0,50,100,0.9) 100%);
            border-bottom: 2px solid #00f0ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.2);
        }

        .chat-header .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: #fff;
            text-shadow: 0 0 10px #00f0ff;
        }

        .topic-display {
            font-size: 0.9rem;
            color: #ff8c00;
            background: rgba(255, 140, 0, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #ff8c00;
            max-width: 50%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .msg-container {
            display: flex;
            width: 100%;
        }

        .msg-container.user { justify-content: flex-end; }
        .msg-container.myra { justify-content: flex-start; }

        .msg-bubble {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .msg-container.user .msg-bubble {
            background: rgba(0, 240, 255, 0.15);
            border: 1px solid #00f0ff;
            color: #fff;
            border-bottom-right-radius: 0;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .msg-container.myra .msg-bubble {
            background: rgba(0, 85, 255, 0.2);
            border: 1px solid #0055ff;
            color: #e0f7fa;
            border-bottom-left-radius: 0;
            box-shadow: 0 0 10px rgba(0, 85, 255, 0.2);
        }

        .msg-image {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 5px;
            border: 1px solid #00f0ff;
        }

        /* Input Area */
        .input-area {
            padding: 15px;
            background: rgba(0, 10, 20, 0.95);
            border-top: 1px solid #00f0ff;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .preview-wrapper {
            display: none;
            position: relative;
            width: 80px; height: 80px;
        }
        .preview-wrapper img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #ff8c00;
        }
        .close-preview {
            position: absolute; top: -5px; right: -5px;
            background: red; color: white; border: none;
            border-radius: 50%; width: 20px; height: 20px;
            font-size: 12px; cursor: pointer;
        }

        .input-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .action-btn {
            background: rgba(0, 240, 255, 0.1);
            color: #00f0ff;
            border: 1px solid #00f0ff;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        .action-btn:hover { background: #00f0ff; color: #000; }

        input[type="text"] {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #0055ff;
            color: #fff;
            padding: 12px 20px;
            border-radius: 25px;
            font-family: inherit;
            font-size: 1.1rem;
            outline: none;
        }
        input[type="text"]:focus { border-color: #00f0ff; box-shadow: 0 0 10px rgba(0, 240, 255, 0.3); }

        .send-btn {
            background: #00f0ff;
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 0 10px #00f0ff;
        }
        .send-btn:hover { background: #fff; box-shadow: 0 0 20px #fff; }

        /* Loader */
        .typing-indicator {
            display: none;
            color: #00f0ff;
            font-size: 0.9rem;
            padding: 5px 20px;
            font-style: italic;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #00f0ff; border-radius: 3px; }
    </style>
</head>
<body>

    <!-- 🌌 JINWOO HD BACKGROUND -->
    <div class="bg-container" id="bgContainer"></div>
    <div class="aura-overlay"></div>

    <!-- ================= 1. HOME SCREEN (HUD) ================= -->
    <div id="homeScreen">
        <h1 class="hero-title">MYRA AI 2.0</h1>
        <div class="hero-subtitle">SYSTEM HUNTER // ONLINE</div>
        
        <canvas id="hudCanvas" width="300" height="300"></canvas>
        
        <button class="enter-btn" onclick="openChat()">INITIALIZE LINK</button>
    </div>

    <!-- ================= 2. CHAT SCREEN ================= -->
    <div id="chatScreen">
        <div class="chat-header">
            <div class="title">MYRA AI</div>
            <div id="topicDisplay" class="topic-display">Topic: System Ready</div>
            <button class="action-btn" style="border-radius:5px; padding: 5px 10px; font-size:1rem;" onclick="closeChat()">Back</button>
        </div>

        <div id="chatBox" class="chat-box">
            <!-- Messages will appear here -->
            <div class="msg-container myra">
                <div class="msg-bubble">सिस्टम रेडी है बॉस। आज का क्या मिशन है?</div>
            </div>
        </div>

        <div id="typingIndicator" class="typing-indicator">Myra is analyzing...</div>

        <div class="input-area">
            <div id="previewWrapper" class="preview-wrapper">
                <img id="imgPreview" src="" alt="Preview">
                <button class="close-preview" onclick="removeImage()">X</button>
            </div>

            <div class="input-controls">
                <label for="imageInput" class="action-btn" title="Upload Photo">📷</label>
                <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="previewImage(event)">
                
                <button class="action-btn" onclick="handleMic()" title="Voice Command">🎤</button>
                
                <input type="text" id="userInput" placeholder="Type command..." onkeypress="if(event.key === 'Enter') processQuery()">
                <button class="send-btn" onclick="processQuery()">SEND</button>
            </div>
        </div>
    </div>

    <script>
        // 👉 अपनी Gemini API Key यहाँ डालें:
        const GEMINI_API_KEY = "YOUR_GEMINI_API_KEY_HERE"; 

        const homeScreen = document.getElementById('homeScreen');
        const chatScreen = document.getElementById('chatScreen');
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const typingIndicator = document.getElementById('typingIndicator');
        const topicDisplay = document.getElementById('topicDisplay');
        
        let currentImageBase64 = null;
        let chatHistory = []; 
        let topicSet = false;

        // --- SCREEN NAVIGATION ---
        function openChat() {
            homeScreen.style.display = 'none';
            chatScreen.style.display = 'flex';
        }
        function closeChat() {
            chatScreen.style.display = 'none';
            homeScreen.style.display = 'flex';
        }

        // --- VOICE ---
        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'hi-IN';
            msg.rate = 1.0;
            window.speechSynthesis.speak(msg);
        }

        // --- IMAGE HANDLING ---
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imgPreview').src = e.target.result;
                    document.getElementById('previewWrapper').style.display = 'block';
                    currentImageBase64 = e.target.result.split(',')[1];
                }
                reader.readAsDataURL(file);
            }
        }
        function removeImage() {
            currentImageBase64 = null;
            document.getElementById('previewWrapper').style.display = 'none';
            document.getElementById('imageInput').value = "";
        }

        // --- ADD MESSAGE TO UI ---
        function appendMessage(sender, text, imgBase64 = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg-container ${sender}`;
            
            let content = `<div class="msg-bubble">${text}`;
            if (imgBase64) {
                content += `<br><img src="data:image/jpeg;base64,${imgBase64}" class="msg-image">`;
            }
            content += `</div>`;
            
            msgDiv.innerHTML = content;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // --- MAIN AI PROCESS ---
        async function processQuery() {
            const text = userInput.value.trim();
            if (!text && !currentImageBase64) return;

            // Auto-generate Topic from first query
            if (!topicSet && text) {
                const words = text.split(" ").slice(0, 3).join(" ");
                topicDisplay.innerText = "Topic: " + words + "...";
                topicSet = true;
            }

            // Show user message in UI
            appendMessage('user', text, currentImageBase64);
            userInput.value = "";
            typingIndicator.style.display = 'block';

            try {
                let url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;

                let currentParts = [];
                if (text) currentParts.push({ text: text });
                
                if (currentImageBase64) {
                    currentParts.push({
                        inline_data: { mime_type: "image/jpeg", data: currentImageBase64 }
                    });
                    removeImage(); // Clear image after sending
                }

                chatHistory.push({ role: "user", parts: currentParts });

                let fullPayload = {
                    contents: [
                        { role: "user", parts: [{ text: "Instruction: You are Myra AI 2.0, boss Niraj's highly advanced system assistant. Answer dynamically. Never repeat generic phrases like 'I saw the photo'. Answer in Hinglish/Hindi with a smart tone." }] },
                        ...chatHistory
                    ]
                };

                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(fullPayload)
                });

                const data = await response.json();
                typingIndicator.style.display = 'none';

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    let aiReply = data.candidates[0].content.parts[0].text;
                    chatHistory.push({ role: "model", parts: [{ text: aiReply }] });
                    appendMessage('myra', aiReply);
                    speak(aiReply);
                } else {
                    appendMessage('myra', "Error: System failed to generate response.");
                }

            } catch (error) {
                console.error(error);
                typingIndicator.style.display = 'none';
                appendMessage('myra', "API Error! Check internet or API Key.");
            }
        }

        // --- MIC ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'hi-IN';
            recognition.onresult = (e) => {
                userInput.value = e.results[0][0].transcript;
                processQuery();
            };
            function handleMic() { recognition.start(); }
        }

        // --- ROTATING HUD CANVAS (HOME SCREEN) ---
        const canvas = document.getElementById('hudCanvas');
        const ctx = canvas.getContext('2d');
        
        let angle = 0;
        function drawHUD() {
            if(homeScreen.style.display === 'none') {
                requestAnimationFrame(drawHUD);
                return;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            
            // Outer Ring
            ctx.strokeStyle = '#00f0ff';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(cx, cy, 100, angle, angle + Math.PI * 1.2);
            ctx.stroke();

            // Inner Ring
            ctx.strokeStyle = '#ff8c00';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(cx, cy, 80, -angle, -angle + Math.PI * 0.8);
            ctx.stroke();

            angle += 0.03;
            requestAnimationFrame(drawHUD);
        }
        drawHUD();
    </script>
</body>
</html>
